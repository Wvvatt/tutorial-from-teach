[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
extra_scripts = pre:extra_script.py
upload_port = /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
upload_speed = 460800
monitor_port = /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
